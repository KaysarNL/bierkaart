<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
  <title>🍺 Bierbeheer</title>

  <!-- PWA / iOS home screen -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Bierbeheer">
  <meta name="theme-color" content="#0f0f0f">

  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0e6c8;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    header {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 { font-size: 1.3rem; color: #c8952a; }
    header span { font-size: 1.4rem; }

    .section {
      max-width: 520px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h2 { font-size: 1rem; color: #c8952a; margin-bottom: 1rem; }

    /* Kelder toggle */
    .kelder-status {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
    }

    .kelder-label {
      font-size: 1rem;
      font-weight: bold;
    }

    .kelder-label.open { color: #5aaa6a; }
    .kelder-label.dicht { color: #e05a2b; }

    .btn-toggle {
      padding: 0.6rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-toggle.open { background: #e05a2b; color: #fff; }
    .btn-toggle.open:hover { background: #c04020; }
    .btn-toggle.dicht { background: #5aaa6a; color: #0f0f0f; }
    .btn-toggle.dicht:hover { background: #4a9a5a; }
    .btn-toggle:disabled { background: #333; color: #666; cursor: not-allowed; }

    /* Scanner */
    #scanner-container {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.85rem;
    }

    #reader { width: 100%; }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #c8952a;
      color: #0f0f0f;
      width: 100%;
      margin-top: 0.75rem;
    }

    .btn-primary:hover { background: #e0a830; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: #c8952a;
      border: 1px solid #c8952a55;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-secondary:hover { border-color: #c8952a; background: #1f1a10; }

    .btn-danger {
      background: transparent;
      color: #e05a2b;
      border: 1px solid #e05a2b44;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: #1f0f0a; border-color: #e05a2b; }

    .field { margin-bottom: 0.9rem; }

    label {
      display: block;
      font-size: 0.8rem;
      color: #7a6a4a;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0e6c8;
      padding: 0.6rem 0.85rem;
      font-size: 1rem; /* min 16px voorkomt iOS auto-zoom */
      font-family: 'Arial', sans-serif;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus { outline: none; border-color: #c8952a55; }
    textarea { resize: vertical; min-height: 60px; }

    .row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }

    #lookup-status {
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.75rem;
      display: none;
    }

    #lookup-status.success { display: block; background: #0f2010; border: 1px solid #2a5a30; color: #5aaa6a; }
    #lookup-status.warning { display: block; background: #1f1200; border: 1px solid #5a3a00; color: #c8952a; }
    #lookup-status.error   { display: block; background: #1f0a0a; border: 1px solid #5a2020; color: #e05a2b; }

    .beer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1f1f1f;
      gap: 0.5rem;
    }

    .beer-row:last-child { border-bottom: none; }
    .beer-info { flex: 1; min-width: 0; }

    .beer-info strong {
      display: block;
      font-size: 0.9rem;
      color: #f0e6c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .beer-info span { font-size: 0.75rem; color: #7a6a4a; }

    .stock-controls { display: flex; align-items: center; gap: 0.4rem; flex-shrink: 0; }

    .stock-btn {
      background: #1f1a10;
      border: 1px solid #3a2e18;
      color: #c8952a;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .stock-btn:hover { background: #2a2010; }
    .stock-count { min-width: 24px; text-align: center; font-weight: bold; font-size: 0.95rem; color: #c8952a; }

    #list-loading { color: #555; font-size: 0.85rem; font-style: italic; padding: 0.5rem 0; }

    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f1a10;
      border: 1px solid #c8952a55;
      color: #c8952a;
      padding: 0.65rem 1.25rem;
      border-radius: 30px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    .divider { text-align: center; color: #333; font-size: 0.8rem; margin: 0.5rem 0; }

    /* ── PIN SCHERM ────────────────────────────────────────────── */
    #pin-scherm {
      position: fixed; inset: 0; z-index: 999;
      background: #0f0f0f;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }

    #pin-scherm.verborgen { display: none; }

    .pin-titel {
      font-size: 1.5rem; color: #c8952a;
      font-family: Georgia, serif;
      margin-bottom: 0.4rem;
    }
    .pin-sub { font-size: 0.82rem; color: #5a4a2a; margin-bottom: 2rem; }

    .pin-dots {
      display: flex; gap: 14px; margin-bottom: 2.5rem;
    }
    .pin-dot {
      width: 14px; height: 14px; border-radius: 50%;
      border: 2px solid #3a2e18;
      background: transparent;
      transition: background 0.15s, border-color 0.15s;
    }
    .pin-dot.vol { background: #c8952a; border-color: #c8952a; }
    .pin-dot.fout { background: #e05a2b; border-color: #e05a2b; }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, min(72px, 26vw));
      gap: 12px;
    }
    .pin-key {
      width: min(72px, 26vw); height: min(72px, 26vw); border-radius: 50%;
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #f0e6c8; font-size: 1.5rem; font-weight: bold;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.12s, transform 0.1s;
      user-select: none; -webkit-user-select: none;
    }
    .pin-key:active { background: #2a2010; transform: scale(0.93); }
    .pin-key.wis { font-size: 1.1rem; color: #7a6a4a; }
    .pin-key.leeg { background: transparent; border-color: transparent; pointer-events: none; }

    @keyframes schudden {
      0%,100% { transform: translateX(0); }
      20%,60%  { transform: translateX(-8px); }
      40%,80%  { transform: translateX(8px); }
    }
    .pin-dots.schud { animation: schudden 0.4s ease; }
  </style>
</head>
<body>

<!-- PIN SCHERM -->
<div id="pin-scherm">
  <div class="pin-titel">🍺 Bierbeheer</div>
  <div class="pin-sub">Voer je PIN in</div>
  <div class="pin-dots" id="pin-dots">
    <div class="pin-dot" id="d0"></div>
    <div class="pin-dot" id="d1"></div>
    <div class="pin-dot" id="d2"></div>
    <div class="pin-dot" id="d3"></div>
    <div class="pin-dot" id="d4"></div>
    <div class="pin-dot" id="d5"></div>
  </div>
  <div class="pin-pad">
    <button class="pin-key" data-k="1">1</button>
    <button class="pin-key" data-k="2">2</button>
    <button class="pin-key" data-k="3">3</button>
    <button class="pin-key" data-k="4">4</button>
    <button class="pin-key" data-k="5">5</button>
    <button class="pin-key" data-k="6">6</button>
    <button class="pin-key" data-k="7">7</button>
    <button class="pin-key" data-k="8">8</button>
    <button class="pin-key" data-k="9">9</button>
    <button class="pin-key leeg"></button>
    <button class="pin-key" data-k="0">0</button>
    <button class="pin-key wis" id="pin-wis">⌫</button>
  </div>
</div>

<header>
  <span>🍺</span>
  <h1>Bierbeheer</h1>
</header>

<div class="section">

  <!-- Kelder schakelaar -->
  <div class="card">
    <h2>🔒 Kelder</h2>
    <div class="kelder-status">
      <span class="kelder-label" id="kelder-label">Laden...</span>
      <button class="btn-toggle" id="btn-kelder" disabled>—</button>
    </div>
    <div style="margin-top:1rem; border-top:1px solid #2a2a2a; padding-top:1rem;">
      <label>✨ Bier van de avond</label>
      <div style="display:flex; gap:0.5rem; margin-top:0.3rem;">
        <select id="bvda-select" style="flex:1;">
          <option value="">— geen —</option>
        </select>
        <button class="btn btn-primary" style="width:auto; margin-top:0;" id="btn-bvda">Opslaan</button>
      </div>
    </div>
  </div>

  <!-- Scanner -->
  <div class="card">
    <h2>📷 Scan barcode</h2>
    <div id="scanner-container">
      <div id="reader"></div>
      <div id="scanner-placeholder">Klik op "Start scanner" om de camera te openen</div>
    </div>
    <button class="btn btn-primary" id="btn-scan">Start scanner</button>
    <div class="divider">of</div>
    <button class="btn btn-secondary" id="btn-manual-barcode">Voer barcode handmatig in</button>
    <div id="manual-barcode-input" style="display:none; margin-top:0.75rem;">
      <div style="display:flex; gap:0.5rem;">
        <input type="number" id="barcode-input" placeholder="Barcodenummer">
        <button class="btn btn-primary" style="width:auto; margin-top:0;" id="btn-lookup">Zoek</button>
      </div>
    </div>
    <button class="btn btn-secondary" style="margin-top:0.5rem;" id="btn-untappd">↗ Bekijk op Untappd</button>
  </div>

  <!-- Formulier -->
  <div class="card" id="form-card">
    <h2>✏️ Biergegevens</h2>
    <div id="lookup-status"></div>

    <div class="field">
      <label>Naam *</label>
      <input type="text" id="f-naam" placeholder="bijv. Westmalle Tripel">
    </div>
    <div class="field">
      <label>Brouwerij</label>
      <input type="text" id="f-brouwerij" placeholder="bijv. Brouwerij Westmalle">
    </div>
    <div class="row">
      <div class="field">
        <label>Stijl</label>
        <input type="text" id="f-stijl" placeholder="bijv. Tripel">
      </div>
      <div class="field">
        <label>ABV (%)</label>
        <input type="number" id="f-abv" placeholder="bijv. 9.5" step="0.1" min="0" max="30">
      </div>
    </div>
    <div class="field">
      <label>Voorraad (flessen) *</label>
      <input type="number" id="f-voorraad" placeholder="bijv. 6" min="0" value="1">
    </div>
    <div class="field">
      <label>Opmerking</label>
      <textarea id="f-opmerking" placeholder="Optionele notitie voor gasten..."></textarea>
    </div>
    <div class="field">
      <label>Foto</label>
      <input type="file" id="f-foto-file" accept="image/*" capture="environment" style="display:none">
      <button type="button" class="btn btn-secondary" id="btn-foto" style="margin-top:0;">📷 Foto maken / kiezen</button>
      <img id="foto-preview" src="" alt="preview" style="display:none; width:100%; border-radius:8px; margin-top:0.6rem; object-fit:cover; max-height:180px;">
      <button type="button" class="btn btn-danger" id="btn-foto-wis" style="display:none; margin-top:0.4rem; width:auto;">✕ Verwijderen</button>
    </div>

    <button class="btn btn-primary" id="btn-save">Opslaan in Airtable</button>
    <button class="btn btn-secondary" id="btn-reset" style="margin-top:0.5rem;">Leegmaken</button>
  </div>

  <!-- Enrichment -->
  <div class="card">
    <h2>🤖 Bier verrijken</h2>
    <p style="font-size:0.85rem; color:#7a6a4a; margin-bottom:0.75rem;">Vult automatisch Smaakprofiel, VoorWie en Waarschuwing in voor bieren die dat nog missen.</p>
    <button class="btn btn-secondary" id="btn-enricheer">✨ Verrijk lege bieren</button>
    <div id="enricheer-result" style="margin-top:0.75rem; font-size:0.85rem; color:#c8952a; display:none;"></div>
  </div>

  <!-- Voorraadlijst -->
  <div class="card">
    <h2>📦 Huidige voorraad</h2>
    <div id="list-loading">Laden...</div>
    <div id="beer-list"></div>
    <button class="btn btn-secondary" id="btn-refresh" style="margin-top:0.75rem;">↻ Vernieuwen</button>
  </div>

</div>

<div id="toast"></div>

<script>
  function esc(str) {
    return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // Vervang WORKER_URL na 'wrangler deploy' met je echte Workers-URL
  const WORKER_URL = 'https://bierkelder.bg4f5stvrb.workers.dev';

  const FIELDS = {
    naam:      'Naam',
    brouwerij: 'Brouwerij',
    stijl:     'Stijl',
    abv:       'ABV',
    voorraad:  'Voorraad',
    foto:      'Foto',
    opmerking: 'Opmerking',
    gesloten:  'Gesloten'
  };

  const AT_URL     = `${WORKER_URL}/api/airtable/Bieren`;
  const AT_HEADERS = { 'Content-Type': 'application/json' };

  // ─── FOTO ────────────────────────────────────────────────────────
  let fotoFile = null;
  let fotoVeldId = null;

  async function laadFotoVeldId() {
    try {
      const res = await fetch(`${WORKER_URL}/api/airtable-meta`);
      const data = await res.json();
      const tabel = data.tables?.find(t => t.name === CONFIG.tableName);
      const veld  = tabel?.fields?.find(f => f.name === 'Foto' && f.type === 'multipleAttachments');
      fotoVeldId = veld?.id || null;
    } catch {}
  }

  document.getElementById('btn-foto').addEventListener('click', () => {
    document.getElementById('f-foto-file').click();
  });

  document.getElementById('f-foto-file').addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    fotoFile = file;
    const reader = new FileReader();
    reader.onload = ev => {
      const preview = document.getElementById('foto-preview');
      preview.src = ev.target.result;
      preview.style.display = 'block';
      document.getElementById('btn-foto-wis').style.display = 'inline-block';
      document.getElementById('btn-foto').textContent = '📷 Andere foto';
    };
    reader.readAsDataURL(file);
  });

  document.getElementById('btn-foto-wis').addEventListener('click', () => {
    fotoFile = null;
    document.getElementById('f-foto-file').value = '';
    document.getElementById('foto-preview').style.display = 'none';
    document.getElementById('foto-preview').src = '';
    document.getElementById('btn-foto-wis').style.display = 'none';
    document.getElementById('btn-foto').textContent = '📷 Foto maken / kiezen';
  });

  async function uploadFoto(recordId) {
    if (!fotoFile || !fotoVeldId) return;
    const form = new FormData();
    form.append('file', fotoFile, fotoFile.name || 'foto.jpg');
    form.append('filename', fotoFile.name || 'foto.jpg');
    form.append('contentType', fotoFile.type || 'image/jpeg');
    await fetch(
      `${WORKER_URL}/api/content/${recordId}/${fotoVeldId}`,
      { method: 'POST', body: form }
    );
  }

  // ─── KELDER SCHAKELAAR ──────────────────────────────────────────
  let statusRecordId = null;
  let isGesloten = false;
  let huidigBvda = '';

  async function laadKelderStatus() {
    try {
      const res = await fetch(AT_URL, { headers: AT_HEADERS });
      const data = await res.json();
      const statusRecord = data.records.find(r => r.fields[FIELDS.naam] === '⚙️ Status');
      if (statusRecord) {
        statusRecordId = statusRecord.id;
        isGesloten = statusRecord.fields[FIELDS.gesloten] || false;
        huidigBvda = statusRecord.fields['BierVanDeAvond'] || '';
        updateKelderUI();
      }
    } catch { showToast('Status laden mislukt.'); }
  }

  function updateKelderUI() {
    const label = document.getElementById('kelder-label');
    const btn = document.getElementById('btn-kelder');
    if (isGesloten) {
      label.textContent = '🔒 Kelder gesloten';
      label.className = 'kelder-label dicht';
      btn.textContent = 'Kelder openen';
      btn.className = 'btn-toggle dicht';
    } else {
      label.textContent = '✅ Kelder open';
      label.className = 'kelder-label open';
      btn.textContent = 'Kelder sluiten';
      btn.className = 'btn-toggle open';
    }
    btn.disabled = false;
  }

  document.getElementById('btn-bvda').addEventListener('click', async () => {
    if (!statusRecordId) return;
    const val = document.getElementById('bvda-select').value;
    const btn = document.getElementById('btn-bvda');
    btn.disabled = true;
    try {
      await fetch(`${AT_URL}/${statusRecordId}`, {
        method: 'PATCH', headers: AT_HEADERS,
        body: JSON.stringify({ fields: { BierVanDeAvond: val } })
      });
      huidigBvda = val;
      showToast(val ? `✨ ${val} is bier vd avond!` : '✨ Bier vd avond gewist');
    } catch { showToast('Opslaan mislukt.'); }
    finally { btn.disabled = false; }
  });

  document.getElementById('btn-kelder').addEventListener('click', async () => {
    if (!statusRecordId) return;
    const btn = document.getElementById('btn-kelder');
    btn.disabled = true;
    const nieuw = !isGesloten;
    try {
      await fetch(`${AT_URL}/${statusRecordId}`, {
        method: 'PATCH',
        headers: AT_HEADERS,
        body: JSON.stringify({ fields: { [FIELDS.gesloten]: nieuw } })
      });
      isGesloten = nieuw;
      updateKelderUI();
      showToast(isGesloten ? '🔒 Kelder gesloten' : '✅ Kelder geopend');
    } catch {
      showToast('Bijwerken mislukt.');
      btn.disabled = false;
    }
  });

  // ─── SCANNER ────────────────────────────────────────────────────
  let scanner = null;
  let scanning = false;

  document.getElementById('btn-scan').addEventListener('click', async () => {
    if (scanning) { await stopScanner(); } else { await startScanner(); }
  });

  async function startScanner() {
    document.getElementById('scanner-placeholder').style.display = 'none';
    scanner = new Html5Qrcode('reader');
    try {
      await scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 120 } },
        onBarcodeDetected, () => {}
      );
      scanning = true;
      document.getElementById('btn-scan').textContent = 'Stop scanner';
    } catch { showStatus('Geen cameratoegang. Gebruik handmatige invoer.', 'error'); }
  }

  async function stopScanner() {
    if (scanner && scanning) {
      await scanner.stop();
      scanner = null;
      scanning = false;
      document.getElementById('btn-scan').textContent = 'Start scanner';
    }
  }

  async function onBarcodeDetected(barcode) {
    await stopScanner();
    showToast(`Barcode gevonden: ${barcode}`);
    await lookupBarcode(barcode);
  }

  document.getElementById('btn-manual-barcode').addEventListener('click', () => {
    const div = document.getElementById('manual-barcode-input');
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('btn-lookup').addEventListener('click', async () => {
    const val = document.getElementById('barcode-input').value.trim();
    if (val) await lookupBarcode(val);
  });

  // ─── OPEN FOOD FACTS (barcode) ──────────────────────────────────
  async function lookupBarcode(barcode) {
    showStatus('Bierinfo ophalen...', 'warning');
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
      const data = await res.json();
      if (data.status === 0) { showStatus('Bier niet gevonden. Vul handmatig in.', 'warning'); return; }
      vulFormulierIn(data.product);
    } catch { showStatus('Fout bij ophalen. Probeer opnieuw.', 'error'); }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('lookup-status');
    el.textContent = msg;
    el.className = type;
  }

  // ─── OPSLAAN ────────────────────────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async () => {
    const naam = document.getElementById('f-naam').value.trim();
    const voorraad = parseInt(document.getElementById('f-voorraad').value);
    if (!naam) { showToast('Vul minimaal een naam in.'); return; }
    if (isNaN(voorraad)) { showToast('Vul een geldige voorraad in.'); return; }
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Opslaan...';
    const fields = {
      [FIELDS.naam]:      naam,
      [FIELDS.brouwerij]: document.getElementById('f-brouwerij').value.trim(),
      [FIELDS.stijl]:     document.getElementById('f-stijl').value.trim(),
      [FIELDS.voorraad]:  voorraad,
      [FIELDS.opmerking]: document.getElementById('f-opmerking').value.trim()
    };
    const abv = parseFloat(document.getElementById('f-abv').value);
    if (!isNaN(abv)) fields[FIELDS.abv] = abv;
    try {
      const res = await fetch(AT_URL, { method: 'POST', headers: AT_HEADERS, body: JSON.stringify({ fields }) });
      if (!res.ok) throw new Error(await res.text());
      const saved = await res.json();
      if (fotoFile && fotoVeldId) {
        try { await uploadFoto(saved.id); } catch { showToast('Bier opgeslagen, foto uploaden mislukt.'); }
      }
      showToast('✓ Bier opgeslagen!');
      resetForm();
      loadBeerList();
    } catch { showToast('Opslaan mislukt.'); }
    finally { btn.disabled = false; btn.textContent = 'Opslaan in Airtable'; }
  });

  function resetForm() {
    ['f-naam','f-brouwerij','f-stijl','f-abv','f-voorraad','f-opmerking','barcode-input'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = id === 'f-voorraad' ? '1' : '';
    });
    document.getElementById('lookup-status').className = '';
    document.getElementById('btn-foto-wis').click();
  }

  document.getElementById('btn-reset').addEventListener('click', resetForm);

  // ─── VOORRAADLIJST ──────────────────────────────────────────────
  let beers = [];

  async function loadBeerList() {
    document.getElementById('list-loading').style.display = 'block';
    document.getElementById('beer-list').innerHTML = '';
    try {
      const res = await fetch(AT_URL + '?sort%5B0%5D%5Bfield%5D=Naam', { headers: AT_HEADERS });
      const data = await res.json();
      beers = data.records
        .filter(r => r.fields[FIELDS.naam] !== '⚙️ Status')
        .map(r => ({
          id: r.id,
          naam: r.fields[FIELDS.naam] || '—',
          brouwerij: r.fields[FIELDS.brouwerij] || '',
          stijl: r.fields[FIELDS.stijl] || '',
          voorraad: r.fields[FIELDS.voorraad] ?? 0
        }));
      renderBeerList();
      vulBvdaDropdown();
    } catch { document.getElementById('list-loading').textContent = 'Laden mislukt.'; }
  }

  function vulBvdaDropdown() {
    const sel = document.getElementById('bvda-select');
    const huidig = sel.value || huidigBvda;
    sel.innerHTML = '<option value="">— geen —</option>';
    beers.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.naam;
      opt.textContent = b.naam;
      if (b.naam === huidig) opt.selected = true;
      sel.appendChild(opt);
    });
    if (!sel.value && huidigBvda) sel.value = huidigBvda;
  }

  function renderBeerList() {
    document.getElementById('list-loading').style.display = 'none';
    const container = document.getElementById('beer-list');
    container.innerHTML = '';
    if (beers.length === 0) {
      container.innerHTML = '<p style="color:#555;font-size:0.85rem;font-style:italic;">Nog geen bieren toegevoegd.</p>';
      return;
    }
    beers.forEach(beer => {
      const row = document.createElement('div');
      row.className = 'beer-row';
      row.innerHTML = `
        <div class="beer-info">
          <strong>${esc(beer.naam)}</strong>
          <span>${esc([beer.brouwerij, beer.stijl].filter(Boolean).join(' · '))}</span>
        </div>
        <div class="stock-controls">
          <button class="stock-btn" data-id="${esc(beer.id)}" data-action="min">−</button>
          <span class="stock-count">${beer.voorraad}</span>
          <button class="stock-btn" data-id="${esc(beer.id)}" data-action="plus">+</button>
          <button class="btn btn-danger" data-id="${esc(beer.id)}" data-action="delete">✕</button>
        </div>`;
      container.appendChild(row);
    });
    container.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleStockAction(btn.dataset.id, btn.dataset.action));
    });
  }

  async function handleStockAction(id, action) {
    const beer = beers.find(b => b.id === id);
    if (!beer) return;
    if (action === 'delete') {
      if (!confirm(`"${beer.naam}" verwijderen?`)) return;
      try {
        await fetch(`${AT_URL}/${id}`, { method: 'DELETE', headers: AT_HEADERS });
        showToast(`${beer.naam} verwijderd.`);
        loadBeerList();
      } catch { showToast('Verwijderen mislukt.'); }
      return;
    }
    const nieuw = action === 'plus' ? beer.voorraad + 1 : Math.max(0, beer.voorraad - 1);
    // Disable alle knoppen van deze rij tijdens de call
    const rij = document.querySelector(`[data-id="${id}"][data-action="min"]`)?.closest('.stock-controls');
    const knopjes = rij ? rij.querySelectorAll('button') : [];
    knopjes.forEach(k => k.disabled = true);
    try {
      await fetch(`${AT_URL}/${id}`, {
        method: 'PATCH', headers: AT_HEADERS,
        body: JSON.stringify({ fields: { [FIELDS.voorraad]: nieuw } })
      });
      beer.voorraad = nieuw;
      renderBeerList();
    } catch {
      showToast('Bijwerken mislukt.');
      knopjes.forEach(k => k.disabled = false);
    }
  }

  document.getElementById('btn-refresh').addEventListener('click', loadBeerList);

  // ─── VERRIJKEN ──────────────────────────────────────────────────
  document.getElementById('btn-enricheer').addEventListener('click', async () => {
    const btn = document.getElementById('btn-enricheer');
    const res = document.getElementById('enricheer-result');
    btn.disabled = true;
    btn.textContent = '⏳ Bezig…';
    res.style.display = 'none';
    try {
      const r    = await fetch(`${WORKER_URL}/api/enricheer`, { method: 'POST' });
      const data = await r.json();
      res.style.display = 'block';
      if (data.resultaten?.length) {
        res.innerHTML = `<b>${data.bericht}</b><br>` +
          data.resultaten.map(r => `${r.status} ${r.naam}${r.velden?.length ? ' (' + r.velden.join(', ') + ')' : ''}`).join('<br>');
      } else {
        res.textContent = data.bericht || 'Klaar';
      }
      loadBeerList();
    } catch(e) {
      res.style.display = 'block';
      res.textContent = 'Fout: ' + e.message;
    } finally {
      btn.disabled = false;
      btn.textContent = '✨ Verrijk lege bieren';
    }
  });

  // ─── TOAST ──────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  function vulFormulierIn(p) {
    const naam      = p.product_name_nl || p.product_name || '';
    const brouwerij = p.brands || '';
    const abv       = p.nutriments?.['alcohol_100g'] || p.alcohol_100g || '';
    const cats      = p.categories_tags || [];
    const stijlMap  = {
      'tripel':'Tripel','triple':'Tripel','dubbel':'Dubbel','double':'Dubbel',
      'quadrupel':'Quadrupel','quadruple':'Quadrupel','ipa':'IPA',
      'pale-ale':'Pale Ale','pale_ale':'Pale Ale','stout':'Stout','porter':'Porter',
      'witbier':'Witbier','wheat':'Witbier','lager':'Lager','pilsner':'Pilsner',
      'pils':'Pilsner','saison':'Saison','lambic':'Lambic','gueuze':'Gueuze',
      'barleywine':'Barleywine','sour':'Sour'
    };
    let stijl = '';
    for (const cat of cats) {
      const key = cat.toLowerCase().replace('en:','').replace('nl:','');
      for (const [match, label] of Object.entries(stijlMap)) {
        if (key.includes(match)) { stijl = label; break; }
      }
      if (stijl) break;
    }
    if (naam)      document.getElementById('f-naam').value      = naam;
    if (brouwerij) document.getElementById('f-brouwerij').value = brouwerij;
    if (stijl)     document.getElementById('f-stijl').value     = stijl;
    if (abv)       document.getElementById('f-abv').value       = parseFloat(abv).toFixed(1);
    const gevonden = [naam && 'naam', brouwerij && 'brouwerij', stijl && 'stijl', abv && 'ABV'].filter(Boolean);
    showStatus(`✓ Gevonden: ${gevonden.join(', ')}. Controleer en vul aan.`, 'success');
  }

  // ─── UNTAPPD ────────────────────────────────────────────────────
  document.getElementById('btn-untappd').addEventListener('click', () => {
    const q = document.getElementById('f-naam').value.trim();
    if (!q) { showToast('Vul eerst een biernaam in het formulier in.'); return; }
    window.open('https://untappd.com/search?q=' + encodeURIComponent(q), '_blank');
  });

  // ─── PIN ────────────────────────────────────────────────────────
  // Hash van de PIN — standaard "2026". Wijzig via: btoa(await pinHash('nieuwepin'))
  // of vervang de hash hieronder na het berekenen.
  const PIN_HASH = '765915d829ae97f6d15a77bf528b554e9925d4b8fd10fbb58182f218da45a348';
  const PIN_SESSIE_KEY = 'bierbeheer_auth';

  async function pinHash(pin) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pin));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  let pinInvoer = '';

  function pinDots() {
    for (let i = 0; i < 6; i++) {
      document.getElementById('d' + i).className = 'pin-dot' + (i < pinInvoer.length ? ' vol' : '');
    }
  }

  async function pinControle() {
    const hash = await pinHash(pinInvoer);
    if (hash === PIN_HASH) {
      sessionStorage.setItem(PIN_SESSIE_KEY, '1');
      document.getElementById('pin-scherm').classList.add('verborgen');
    } else {
      const dots = document.getElementById('pin-dots');
      document.querySelectorAll('.pin-dot').forEach(d => d.classList.add('fout'));
      dots.classList.add('schud');
      dots.addEventListener('animationend', () => {
        dots.classList.remove('schud');
        document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('fout'));
      }, { once: true });
      pinInvoer = '';
      pinDots();
    }
  }

  document.querySelectorAll('.pin-key[data-k]').forEach(btn => {
    btn.addEventListener('click', async () => {
      if (pinInvoer.length >= 6) return;
      pinInvoer += btn.dataset.k;
      pinDots();
      if (pinInvoer.length === 6) await pinControle();
    });
  });

  document.getElementById('pin-wis').addEventListener('click', () => {
    pinInvoer = pinInvoer.slice(0, -1);
    pinDots();
  });

  // Check of sessie al geauthenticeerd is
  if (sessionStorage.getItem(PIN_SESSIE_KEY) === '1') {
    document.getElementById('pin-scherm').classList.add('verborgen');
  }

  // ─── INIT ───────────────────────────────────────────────────────
  laadFotoVeldId();
  laadKelderStatus();
  loadBeerList();
</script>
</body>
</html>
