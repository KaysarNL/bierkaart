<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍺 Bierbeheer</title>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0f0f0f;
      color: #f0e6c8;
      font-family: 'Arial', sans-serif;
      min-height: 100vh;
      padding-bottom: 3rem;
    }

    header {
      background: #161616;
      border-bottom: 1px solid #2a2a2a;
      padding: 1.25rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    header h1 {
      font-size: 1.3rem;
      color: #c8952a;
    }

    header span { font-size: 1.4rem; }

    .section {
      max-width: 520px;
      margin: 1.5rem auto;
      padding: 0 1rem;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 1.25rem;
      margin-bottom: 1rem;
    }

    .card h2 {
      font-size: 1rem;
      color: #c8952a;
      margin-bottom: 1rem;
    }

    /* Scanner */
    #scanner-container {
      width: 100%;
      border-radius: 8px;
      overflow: hidden;
      background: #111;
      min-height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      font-size: 0.85rem;
    }

    #reader { width: 100%; }

    .btn {
      display: inline-block;
      padding: 0.65rem 1.25rem;
      border-radius: 8px;
      border: none;
      font-size: 0.9rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
    }

    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #c8952a;
      color: #0f0f0f;
      width: 100%;
      margin-top: 0.75rem;
    }

    .btn-primary:hover { background: #e0a830; }
    .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; transform: none; }

    .btn-secondary {
      background: transparent;
      color: #c8952a;
      border: 1px solid #c8952a55;
      width: 100%;
      margin-top: 0.5rem;
    }

    .btn-secondary:hover { border-color: #c8952a; background: #1f1a10; }

    .btn-danger {
      background: transparent;
      color: #e05a2b;
      border: 1px solid #e05a2b44;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
    }

    .btn-danger:hover { background: #1f0f0a; border-color: #e05a2b; }

    /* Form */
    .field {
      margin-bottom: 0.9rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      color: #7a6a4a;
      margin-bottom: 0.3rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input, textarea, select {
      width: 100%;
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      color: #f0e6c8;
      padding: 0.6rem 0.85rem;
      font-size: 0.95rem;
      font-family: 'Arial', sans-serif;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus {
      outline: none;
      border-color: #c8952a55;
    }

    textarea { resize: vertical; min-height: 60px; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    /* Status */
    #lookup-status {
      font-size: 0.82rem;
      padding: 0.5rem 0.75rem;
      border-radius: 6px;
      margin-bottom: 0.75rem;
      display: none;
    }

    #lookup-status.success {
      display: block;
      background: #0f2010;
      border: 1px solid #2a5a30;
      color: #5aaa6a;
    }

    #lookup-status.warning {
      display: block;
      background: #1f1200;
      border: 1px solid #5a3a00;
      color: #c8952a;
    }

    #lookup-status.error {
      display: block;
      background: #1f0a0a;
      border: 1px solid #5a2020;
      color: #e05a2b;
    }

    /* Voorraadlijst */
    .beer-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 0;
      border-bottom: 1px solid #1f1f1f;
      gap: 0.5rem;
    }

    .beer-row:last-child { border-bottom: none; }

    .beer-info { flex: 1; min-width: 0; }

    .beer-info strong {
      display: block;
      font-size: 0.9rem;
      color: #f0e6c8;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .beer-info span {
      font-size: 0.75rem;
      color: #7a6a4a;
    }

    .stock-controls {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      flex-shrink: 0;
    }

    .stock-btn {
      background: #1f1a10;
      border: 1px solid #3a2e18;
      color: #c8952a;
      width: 28px;
      height: 28px;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      flex-shrink: 0;
    }

    .stock-btn:hover { background: #2a2010; }

    .stock-count {
      min-width: 24px;
      text-align: center;
      font-weight: bold;
      font-size: 0.95rem;
      color: #c8952a;
    }

    #list-loading {
      color: #555;
      font-size: 0.85rem;
      font-style: italic;
      padding: 0.5rem 0;
    }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f1a10;
      border: 1px solid #c8952a55;
      color: #c8952a;
      padding: 0.65rem 1.25rem;
      border-radius: 30px;
      font-size: 0.85rem;
      transition: transform 0.3s ease;
      z-index: 200;
      pointer-events: none;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    .divider {
      text-align: center;
      color: #333;
      font-size: 0.8rem;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

<header>
  <span>🍺</span>
  <h1>Bierbeheer</h1>
</header>

<div class="section">

  <!-- Scanner -->
  <div class="card">
    <h2>📷 Scan barcode</h2>
    <div id="scanner-container">
      <div id="reader"></div>
      <div id="scanner-placeholder">Klik op "Start scanner" om de camera te openen</div>
    </div>
    <button class="btn btn-primary" id="btn-scan">Start scanner</button>
    <div class="divider">of</div>
    <button class="btn btn-secondary" id="btn-manual-barcode">Voer barcode handmatig in</button>
    <div id="manual-barcode-input" style="display:none; margin-top:0.75rem;">
      <div style="display:flex; gap:0.5rem;">
        <input type="number" id="barcode-input" placeholder="Barcodenummer">
        <button class="btn btn-primary" style="width:auto; margin-top:0;" id="btn-lookup">Zoek</button>
      </div>
    </div>
  </div>

  <!-- Formulier -->
  <div class="card" id="form-card">
    <h2>✏️ Biergegevens</h2>
    <div id="lookup-status"></div>

    <div class="field">
      <label>Naam *</label>
      <input type="text" id="f-naam" placeholder="bijv. Westmalle Tripel">
    </div>
    <div class="field">
      <label>Brouwerij</label>
      <input type="text" id="f-brouwerij" placeholder="bijv. Brouwerij Westmalle">
    </div>
    <div class="row">
      <div class="field">
        <label>Stijl</label>
        <input type="text" id="f-stijl" placeholder="bijv. Tripel">
      </div>
      <div class="field">
        <label>ABV (%)</label>
        <input type="number" id="f-abv" placeholder="bijv. 9.5" step="0.1" min="0" max="30">
      </div>
    </div>
    <div class="field">
      <label>Voorraad (flessen) *</label>
      <input type="number" id="f-voorraad" placeholder="bijv. 6" min="0" value="1">
    </div>
    <div class="field">
      <label>Opmerking</label>
      <textarea id="f-opmerking" placeholder="Optionele notitie voor gasten..."></textarea>
    </div>
    <div class="field">
      <label>Foto-URL (optioneel)</label>
      <input type="text" id="f-foto" placeholder="https://...">
    </div>

    <button class="btn btn-primary" id="btn-save">Opslaan in Airtable</button>
    <button class="btn btn-secondary" id="btn-reset" style="margin-top:0.5rem;">Leegmaken</button>
  </div>

  <!-- Voorraadlijst -->
  <div class="card">
    <h2>📦 Huidige voorraad</h2>
    <div id="list-loading">Laden...</div>
    <div id="beer-list"></div>
    <button class="btn btn-secondary" id="btn-refresh" style="margin-top:0.75rem;">↻ Vernieuwen</button>
  </div>

</div>

<div id="toast"></div>

<script>
  // ─── CONFIG ─────────────────────────────────────────────────────
  const CONFIG = {
    apiKey:    'patBYJvzTR7Dul1q8.17ad526b3e0a40f590d33e45cd3596110944ec20f207717413bab3fc67100303',
    baseId:    'appjGqsyPJqZdDCQM',
    tableName: 'Bieren'
  };

  const FIELDS = {
    naam:      'Naam',
    brouwerij: 'Brouwerij',
    stijl:     'Stijl',
    abv:       'ABV',
    voorraad:  'Voorraad',
    foto:      'Foto',
    opmerking: 'Opmerking'
  };

  const AT_URL = `https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`;
  const AT_HEADERS = { Authorization: `Bearer ${CONFIG.apiKey}`, 'Content-Type': 'application/json' };

  // ─── SCANNER ────────────────────────────────────────────────────
  let scanner = null;
  let scanning = false;

  document.getElementById('btn-scan').addEventListener('click', async () => {
    if (scanning) {
      await stopScanner();
    } else {
      await startScanner();
    }
  });

  async function startScanner() {
    document.getElementById('scanner-placeholder').style.display = 'none';
    scanner = new Html5Qrcode('reader');
    try {
      await scanner.start(
        { facingMode: 'environment' },
        { fps: 10, qrbox: { width: 250, height: 120 } },
        onBarcodeDetected,
        () => {}
      );
      scanning = true;
      document.getElementById('btn-scan').textContent = 'Stop scanner';
    } catch (err) {
      showStatus('Geen cameratoegang. Gebruik handmatige invoer.', 'error');
    }
  }

  async function stopScanner() {
    if (scanner && scanning) {
      await scanner.stop();
      scanner = null;
      scanning = false;
      document.getElementById('btn-scan').textContent = 'Start scanner';
    }
  }

  async function onBarcodeDetected(barcode) {
    await stopScanner();
    showToast(`Barcode gevonden: ${barcode}`);
    await lookupBarcode(barcode);
  }

  // Handmatige barcode
  document.getElementById('btn-manual-barcode').addEventListener('click', () => {
    const div = document.getElementById('manual-barcode-input');
    div.style.display = div.style.display === 'none' ? 'block' : 'none';
  });

  document.getElementById('btn-lookup').addEventListener('click', async () => {
    const val = document.getElementById('barcode-input').value.trim();
    if (val) await lookupBarcode(val);
  });

  // ─── OPEN FOOD FACTS LOOKUP ─────────────────────────────────────
  async function lookupBarcode(barcode) {
    showStatus('Bierinfo ophalen...', 'warning');
    try {
      const res = await fetch(`https://world.openfoodfacts.org/api/v0/product/${barcode}.json`);
      const data = await res.json();

      if (data.status === 0) {
        showStatus('Bier niet gevonden in database. Vul handmatig in.', 'warning');
        return;
      }

      const p = data.product;
      const naam = p.product_name_nl || p.product_name || '';
      const brouwerij = p.brands || '';
      const abv = p.nutriments?.['alcohol_100g'] || p.alcohol_100g || '';
      const foto = p.image_front_url || p.image_url || '';

      // Stijl uit categorieën halen
      let stijl = '';
      const cats = p.categories_tags || [];
      const stijlMap = {
        'tripel': 'Tripel', 'triple': 'Tripel',
        'dubbel': 'Dubbel', 'double': 'Dubbel',
        'quadrupel': 'Quadrupel', 'quadruple': 'Quadrupel',
        'ipa': 'IPA', 'pale-ale': 'Pale Ale', 'pale_ale': 'Pale Ale',
        'stout': 'Stout', 'porter': 'Porter',
        'witbier': 'Witbier', 'wheat': 'Witbier',
        'lager': 'Lager', 'pilsner': 'Pilsner', 'pils': 'Pilsner',
        'saison': 'Saison', 'lambic': 'Lambic', 'gueuze': 'Gueuze',
        'barleywine': 'Barleywine', 'sour': 'Sour'
      };
      for (const cat of cats) {
        const key = cat.toLowerCase().replace('en:', '').replace('nl:', '');
        for (const [match, label] of Object.entries(stijlMap)) {
          if (key.includes(match)) { stijl = label; break; }
        }
        if (stijl) break;
      }

      document.getElementById('f-naam').value = naam;
      document.getElementById('f-brouwerij').value = brouwerij;
      document.getElementById('f-stijl').value = stijl;
      document.getElementById('f-abv').value = abv ? parseFloat(abv).toFixed(1) : '';
      document.getElementById('f-foto').value = foto;

      const gevonden = [naam && 'naam', brouwerij && 'brouwerij', abv && 'ABV'].filter(Boolean);
      showStatus(`✓ Gevonden: ${gevonden.join(', ')}. Controleer en vul aan.`, 'success');

    } catch (err) {
      showStatus('Fout bij ophalen. Probeer opnieuw of vul handmatig in.', 'error');
    }
  }

  function showStatus(msg, type) {
    const el = document.getElementById('lookup-status');
    el.textContent = msg;
    el.className = type;
  }

  // ─── OPSLAAN ────────────────────────────────────────────────────
  document.getElementById('btn-save').addEventListener('click', async () => {
    const naam = document.getElementById('f-naam').value.trim();
    const voorraad = parseInt(document.getElementById('f-voorraad').value);

    if (!naam) { showToast('Vul minimaal een naam in.'); return; }
    if (isNaN(voorraad)) { showToast('Vul een geldige voorraad in.'); return; }

    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Opslaan...';

    const fields = {
      [FIELDS.naam]:      naam,
      [FIELDS.brouwerij]: document.getElementById('f-brouwerij').value.trim(),
      [FIELDS.stijl]:     document.getElementById('f-stijl').value.trim(),
      [FIELDS.voorraad]:  voorraad,
      [FIELDS.opmerking]: document.getElementById('f-opmerking').value.trim()
    };

    const abv = parseFloat(document.getElementById('f-abv').value);
    if (!isNaN(abv)) fields[FIELDS.abv] = abv;

    try {
      const res = await fetch(AT_URL, {
        method: 'POST',
        headers: AT_HEADERS,
        body: JSON.stringify({ fields })
      });
      if (!res.ok) throw new Error(await res.text());

      showToast('✓ Bier opgeslagen!');
      resetForm();
      loadBeerList();
    } catch (err) {
      showToast('Opslaan mislukt. Probeer opnieuw.');
      console.error(err);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Opslaan in Airtable';
    }
  });

  function resetForm() {
    ['f-naam','f-brouwerij','f-stijl','f-abv','f-voorraad','f-opmerking','f-foto','barcode-input'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.value = id === 'f-voorraad' ? '1' : '';
    });
    document.getElementById('lookup-status').className = '';
  }

  document.getElementById('btn-reset').addEventListener('click', resetForm);

  // ─── VOORRAADLIJST ──────────────────────────────────────────────
  let beers = [];

  async function loadBeerList() {
    document.getElementById('list-loading').style.display = 'block';
    document.getElementById('beer-list').innerHTML = '';
    try {
      const res = await fetch(AT_URL + '?sort%5B0%5D%5Bfield%5D=Naam', { headers: AT_HEADERS });
      const data = await res.json();
      beers = data.records.map(r => ({
        id: r.id,
        naam: r.fields[FIELDS.naam] || '—',
        brouwerij: r.fields[FIELDS.brouwerij] || '',
        stijl: r.fields[FIELDS.stijl] || '',
        voorraad: r.fields[FIELDS.voorraad] ?? 0
      }));
      renderBeerList();
    } catch (err) {
      document.getElementById('list-loading').textContent = 'Laden mislukt.';
    }
  }

  function renderBeerList() {
    document.getElementById('list-loading').style.display = 'none';
    const container = document.getElementById('beer-list');
    container.innerHTML = '';

    if (beers.length === 0) {
      container.innerHTML = '<p style="color:#555;font-size:0.85rem;font-style:italic;">Nog geen bieren toegevoegd.</p>';
      return;
    }

    beers.forEach(beer => {
      const row = document.createElement('div');
      row.className = 'beer-row';
      row.innerHTML = `
        <div class="beer-info">
          <strong>${beer.naam}</strong>
          <span>${[beer.brouwerij, beer.stijl].filter(Boolean).join(' · ')}</span>
        </div>
        <div class="stock-controls">
          <button class="stock-btn" data-id="${beer.id}" data-action="min">−</button>
          <span class="stock-count">${beer.voorraad}</span>
          <button class="stock-btn" data-id="${beer.id}" data-action="plus">+</button>
          <button class="btn btn-danger" data-id="${beer.id}" data-action="delete">✕</button>
        </div>`;
      container.appendChild(row);
    });

    container.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', () => handleStockAction(btn.dataset.id, btn.dataset.action));
    });
  }

  async function handleStockAction(id, action) {
    const beer = beers.find(b => b.id === id);
    if (!beer) return;

    if (action === 'delete') {
      if (!confirm(`"${beer.naam}" verwijderen uit de voorraad?`)) return;
      try {
        await fetch(`${AT_URL}/${id}`, { method: 'DELETE', headers: AT_HEADERS });
        showToast(`${beer.naam} verwijderd.`);
        loadBeerList();
      } catch { showToast('Verwijderen mislukt.'); }
      return;
    }

    const nieuw = action === 'plus' ? beer.voorraad + 1 : Math.max(0, beer.voorraad - 1);
    try {
      await fetch(`${AT_URL}/${id}`, {
        method: 'PATCH',
        headers: AT_HEADERS,
        body: JSON.stringify({ fields: { [FIELDS.voorraad]: nieuw } })
      });
      beer.voorraad = nieuw;
      renderBeerList();
    } catch { showToast('Bijwerken mislukt.'); }
  }

  document.getElementById('btn-refresh').addEventListener('click', loadBeerList);

  // ─── TOAST ──────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── INIT ───────────────────────────────────────────────────────
  loadBeerList();
</script>
</body>
</html>
