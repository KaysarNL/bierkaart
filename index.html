<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🍻 Kaysar's Bierkelder</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background-color: #0f0f0f;
      color: #f0e6c8;
      font-family: 'Georgia', serif;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 3rem 1rem 2rem;
      border-bottom: 1px solid #2a2a2a;
      position: relative;
    }

    header h1 {
      font-size: 2.8rem;
      color: #c8952a;
      letter-spacing: 0.05em;
      text-shadow: 0 0 30px rgba(200, 149, 42, 0.3);
    }

    header p {
      margin-top: 0.5rem;
      color: #7a6a4a;
      font-style: italic;
      font-size: 1rem;
    }

    #status-bar {
      text-align: center;
      padding: 0.75rem;
      font-size: 0.85rem;
      color: #7a6a4a;
      border-bottom: 1px solid #1a1a1a;
    }

    #status-bar.demo-mode {
      background: #1a1200;
      color: #c8952a;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem;
      padding: 2rem;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: #161616;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
      display: flex;
      flex-direction: column;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: #c8952a44;
      box-shadow: 0 8px 32px rgba(200, 149, 42, 0.1);
    }

    .card.sold-out {
      opacity: 0.45;
      filter: grayscale(60%);
    }

    .card-image {
      width: 100%;
      height: 200px;
      object-fit: contain;
      background: #111;
      padding: 1rem;
    }

    .card-image-placeholder {
      width: 100%;
      height: 200px;
      background: linear-gradient(135deg, #1a1a1a, #222);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4rem;
    }

    .card-body {
      padding: 1.25rem;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
    }

    .card-name {
      font-size: 1.15rem;
      font-weight: bold;
      color: #f0e6c8;
      line-height: 1.3;
    }

    .card-brewery {
      font-size: 0.85rem;
      color: #7a6a4a;
      font-style: italic;
    }

    .card-opmerking {
      margin-top: 0.5rem;
      font-size: 0.82rem;
      color: #8a7a5a;
      font-style: italic;
      border-left: 2px solid #3a2e18;
      padding-left: 0.6rem;
      line-height: 1.4;
    }

    .card-tags {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      margin-top: 0.25rem;
    }

    .tag {
      background: #1f1a10;
      border: 1px solid #3a2e18;
      color: #c8952a;
      padding: 0.2rem 0.6rem;
      border-radius: 20px;
      font-size: 0.75rem;
      font-family: 'Arial', sans-serif;
    }

    .card-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid #1f1f1f;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
    }

    .stock {
      font-family: 'Arial', sans-serif;
      font-size: 0.85rem;
      color: #7a6a4a;
    }

    .stock span {
      font-weight: bold;
      color: #c8952a;
    }

    .stock.low span {
      color: #e05a2b;
    }

    .btn-order {
      background: #c8952a;
      color: #0f0f0f;
      border: none;
      padding: 0.5rem 1.1rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: bold;
      font-family: 'Arial', sans-serif;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      white-space: nowrap;
    }

    .btn-order:hover {
      background: #e0a830;
      transform: scale(1.03);
    }

    .btn-order:active {
      transform: scale(0.98);
    }

    .btn-order:disabled {
      background: #2a2a2a;
      color: #555;
      cursor: not-allowed;
      transform: none;
    }

    /* Confirmation overlay */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.8);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .overlay.active {
      display: flex;
    }

    .confirm-box {
      background: #1a1a1a;
      border: 1px solid #c8952a44;
      border-radius: 16px;
      padding: 2rem;
      max-width: 360px;
      width: 100%;
      text-align: center;
      box-shadow: 0 0 60px rgba(200, 149, 42, 0.15);
    }

    .confirm-box h2 {
      color: #c8952a;
      margin-bottom: 0.5rem;
      font-size: 1.4rem;
    }

    .confirm-box p {
      color: #7a6a4a;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    .confirm-actions {
      display: flex;
      gap: 0.75rem;
      justify-content: center;
    }

    .btn-confirm {
      background: #c8952a;
      color: #0f0f0f;
      border: none;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-confirm:hover { background: #e0a830; }

    .btn-cancel {
      background: transparent;
      color: #7a6a4a;
      border: 1px solid #333;
      padding: 0.65rem 1.5rem;
      border-radius: 8px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .btn-cancel:hover {
      border-color: #555;
      color: #aaa;
    }

    /* Toast notification */
    #toast {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1f1a10;
      border: 1px solid #c8952a55;
      color: #c8952a;
      padding: 0.75rem 1.5rem;
      border-radius: 30px;
      font-size: 0.9rem;
      font-family: 'Arial', sans-serif;
      transition: transform 0.3s ease;
      z-index: 200;
      pointer-events: none;
    }

    #toast.show {
      transform: translateX(-50%) translateY(0);
    }

    /* Loading state */
    #loading {
      text-align: center;
      padding: 4rem;
      color: #7a6a4a;
      font-style: italic;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: #2a2a2a;
      font-size: 0.8rem;
      font-family: 'Arial', sans-serif;
    }

    @media (max-width: 480px) {
      header h1 { font-size: 2rem; }
      .grid { padding: 1rem; gap: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <h1>🍻 Kaysar's Bierkelder</h1>
  <p>Kies en geniet</p>
</header>

<div id="status-bar">Laden...</div>

<main>
  <div id="loading">Bieren ophalen...</div>
  <div class="grid" id="grid" style="display:none"></div>
</main>

<div class="overlay" id="overlay">
  <div class="confirm-box">
    <h2 id="confirm-name"></h2>
    <p id="confirm-detail"></p>
    <p id="confirm-warning" style="display:none; margin-bottom:1rem; color:#e05a2b; font-size:0.9rem; background:#1f0f0a; border:1px solid #e05a2b44; border-radius:8px; padding:0.6rem 0.85rem;">⚠️ Dit betreft een grote fles. Weet je het zeker?</p>
    <div class="confirm-actions">
      <button class="btn-confirm" id="btn-confirm">Ja, graag!</button>
      <button class="btn-cancel" id="btn-cancel">Annuleer</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<footer>
  <button id="btn-message" style="background:#1f1a10; border:1px solid #3a2e18; color:#c8952a; padding:0.6rem 1.25rem; border-radius:30px; font-size:0.9rem; cursor:pointer; margin-bottom:1rem;">💬 Stuur een bericht aan Kaysar - de Biersommelier</button>
  <br>Bijgewerkt via Airtable
</footer>

<div class="overlay" id="name-overlay">
  <div class="confirm-box">
    <h2 style="margin-bottom:0.5rem;">👤 Jouw naam</h2>
    <p style="margin-bottom:1rem;">Zodat de biersommelier weet voor wie het is.</p>
    <input type="text" id="name-input" placeholder="Jouw naam..." style="width:100%; background:#111; border:1px solid #2a2a2a; border-radius:8px; color:#f0e6c8; padding:0.7rem 0.85rem; font-size:1rem; font-family:Arial,sans-serif; margin-bottom:1rem;">
    <div class="confirm-actions">
      <button class="btn-confirm" id="btn-name-submit">Bevestig bestelling</button>
      <button class="btn-cancel" id="btn-name-cancel">Annuleer</button>
    </div>
  </div>
</div>

<div class="overlay" id="msg-overlay">
  <div class="confirm-box">
    <h2 style="margin-bottom:0.75rem;">💬 Stuur een bericht</h2>
    <textarea id="msg-input" style="width:100%; background:#111; border:1px solid #2a2a2a; border-radius:8px; color:#f0e6c8; padding:0.75rem; font-size:0.95rem; font-family:Arial,sans-serif; resize:vertical; min-height:80px; margin-bottom:1rem;" placeholder="Typ je bericht..."></textarea>
    <div class="confirm-actions">
      <button class="btn-confirm" id="btn-msg-send">Verstuur</button>
      <button class="btn-cancel" id="btn-msg-cancel">Annuleer</button>
    </div>
  </div>
</div>

<script>
  // ─── CONFIGURATIE ────────────────────────────────────────────────
  const CONFIG = {
    apiKey:    'patBYJvzTR7Dul1q8.17ad526b3e0a40f590d33e45cd3596110944ec20f207717413bab3fc67100303',
    baseId:    'appjGqsyPJqZdDCQM',
    tableName: 'Bieren',
    ntfyTopic: 'kaysar-bierkelder-2026'
  };

  // Airtable veldnamen (pas aan als je andere namen gebruikt):
  const FIELDS = {
    naam:      'Naam',
    brouwerij: 'Brouwerij',
    stijl:     'Stijl',
    abv:       'ABV',
    voorraad:  'Voorraad',
    foto:      'Foto',
    opmerking: 'Opmerking'
  };

  // ─── DEMO DATA (wordt gebruikt als Airtable nog niet gekoppeld is) ──
  const DEMO_BEERS = [
    {
      id: 'demo1',
      naam: 'Westmalle Tripel',
      brouwerij: 'Brouwerij der Trappisten van Westmalle',
      stijl: 'Tripel',
      abv: 9.5,
      voorraad: 4,
      foto: 'https://upload.wikimedia.org/wikipedia/commons/thumb/3/3f/Westmalle_Tripel_2.jpg/800px-Westmalle_Tripel_2.jpg',
      opmerking: 'Fruitig en fris met een lange afdronk. Ideaal bij kaas.'
    },
    {
      id: 'demo2',
      naam: 'Rochefort 10',
      brouwerij: 'Brasserie de Rochefort',
      stijl: 'Quadrupel',
      abv: 11.3,
      voorraad: 2,
      foto: null,
      opmerking: 'Zwaar en complex — iets voor rustig nippen.'
    },
    {
      id: 'demo3',
      naam: 'Orval',
      brouwerij: 'Brasserie d\'Orval',
      stijl: 'Belgian Pale Ale',
      abv: 6.2,
      voorraad: 6,
      foto: null,
      opmerking: null
    },
    {
      id: 'demo4',
      naam: 'Gulden Draak',
      brouwerij: 'Brouwerij Van Steenberge',
      stijl: 'Dark Strong Ale',
      abv: 10.5,
      voorraad: 0,
      foto: null,
      opmerking: null
    },
    {
      id: 'demo5',
      naam: 'De Molen Hel & Verdoemenis',
      brouwerij: 'Brouwerij De Molen',
      stijl: 'Barleywine',
      abv: 10.0,
      voorraad: 3,
      foto: null,
      opmerking: null
    },
    {
      id: 'demo6',
      naam: 'Chimay Bleue',
      brouwerij: 'Bières de Chimay',
      stijl: 'Belgian Strong Dark Ale',
      abv: 9.0,
      voorraad: 5,
      foto: null,
      opmerking: 'Beste bij kamertemperatuur.'
    }
  ];

  // ─── NOTIFICATIE ────────────────────────────────────────────────
  async function sendNotification(beer, gast = 'Anoniem') {
    try {
      await fetch(`https://ntfy.sh/${CONFIG.ntfyTopic}`, {
        method: 'POST',
        headers: { 'Title': 'Kaysar - de Biersommelier' },
        body: `🍺 ${beer.naam} besteld door ${gast} — nog ${beer.voorraad} over`
      });
    } catch (e) {
      // Stille fout — notificatie is niet kritiek
    }
  }

  // ─── UTILS ──────────────────────────────────────────────────────
  function esc(str) {
    return String(str ?? '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  // ─── STATE ──────────────────────────────────────────────────────
  let beers = [];
  let pendingOrder = null;
  let isDemoMode = false;

  // ─── AIRTABLE ───────────────────────────────────────────────────
  function isConfigured() {
    return CONFIG.apiKey && !CONFIG.apiKey.startsWith('JOUW');
  }

  async function fetchFromAirtable() {
    const url = `https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}`;
    const res = await fetch(url, {
      headers: { Authorization: `Bearer ${CONFIG.apiKey}` }
    });
    if (!res.ok) throw new Error(`Airtable fout: ${res.status}`);
    const data = await res.json();
    return data.records.map(r => ({
      id: r.id,
      naam:      r.fields[FIELDS.naam]      || '—',
      brouwerij: r.fields[FIELDS.brouwerij] || '',
      stijl:     r.fields[FIELDS.stijl]     || '',
      abv:       r.fields[FIELDS.abv]        || 0,
      voorraad:  r.fields[FIELDS.voorraad]   ?? 0,
      foto:      r.fields[FIELDS.foto]?.[0]?.url || null,
      opmerking: r.fields[FIELDS.opmerking] || null
    }));
  }

  async function decrementStock(beer) {
    if (isDemoMode) {
      // In demo mode: update lokaal
      beer.voorraad = Math.max(0, beer.voorraad - 1);
      return;
    }
    const url = `https://api.airtable.com/v0/${CONFIG.baseId}/${encodeURIComponent(CONFIG.tableName)}/${beer.id}`;
    const res = await fetch(url, {
      method: 'PATCH',
      headers: {
        Authorization: `Bearer ${CONFIG.apiKey}`,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({ fields: { [FIELDS.voorraad]: beer.voorraad - 1 } })
    });
    if (!res.ok) throw new Error(`Update mislukt: ${res.status}`);
    beer.voorraad -= 1;
  }

  // ─── RENDER ─────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    beers.forEach(beer => {
      const soldOut = beer.voorraad <= 0;
      const lowStock = beer.voorraad > 0 && beer.voorraad <= 2;

      const card = document.createElement('div');
      card.className = `card${soldOut ? ' sold-out' : ''}`;
      card.dataset.id = beer.id;

      const imgHtml = beer.foto
        ? `<img class="card-image" src="${esc(beer.foto)}" alt="${esc(beer.naam)}" loading="lazy">`
        : `<div class="card-image-placeholder">🍺</div>`;

      const abvStr = beer.abv ? `${beer.abv.toFixed(1).replace('.', ',')}%` : '';

      card.innerHTML = `
        ${imgHtml}
        <div class="card-body">
          <div class="card-name">${esc(beer.naam)}</div>
          <div class="card-brewery">${esc(beer.brouwerij)}</div>
          <div class="card-tags">
            ${beer.stijl ? `<span class="tag">${esc(beer.stijl)}</span>` : ''}
            ${abvStr ? `<span class="tag">${abvStr}</span>` : ''}
          </div>
          ${beer.opmerking ? `<div class="card-opmerking">${esc(beer.opmerking)}</div>` : ''}
        </div>
        <div class="card-footer">
          <div class="stock ${lowStock ? 'low' : ''}">
            ${soldOut
              ? 'Uitverkocht'
              : `Voorraad: <span>${beer.voorraad}</span>`}
          </div>
          <button class="btn-order" data-id="${esc(beer.id)}" ${soldOut ? 'disabled' : ''}>
            ${soldOut ? 'Uitverkocht' : 'Bestel'}
          </button>
        </div>`;

      grid.appendChild(card);
    });

    grid.querySelectorAll('.btn-order:not(:disabled)').forEach(btn => {
      btn.addEventListener('click', () => openConfirm(btn.dataset.id));
    });
  }

  // ─── CONFIRM DIALOG ─────────────────────────────────────────────
  function openConfirm(id) {
    const beer = beers.find(b => b.id === id);
    if (!beer) return;
    pendingOrder = beer;
    document.getElementById('confirm-name').textContent = beer.naam;
    document.getElementById('confirm-detail').textContent =
      `${beer.stijl}${beer.abv ? ` · ${beer.abv.toFixed(1).replace('.', ',')}%` : ''}`;
    const isGroteFles = beer.opmerking && beer.opmerking.toLowerCase().includes('grote fles');
    document.getElementById('confirm-warning').style.display = isGroteFles ? 'block' : 'none';
    document.getElementById('overlay').classList.add('active');
  }

  function closeConfirm() {
    pendingOrder = null;
    document.getElementById('overlay').classList.remove('active');
  }

  document.getElementById('btn-cancel').addEventListener('click', closeConfirm);
  document.getElementById('overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('overlay')) closeConfirm();
  });

  document.getElementById('btn-confirm').addEventListener('click', () => {
    if (!pendingOrder) return;
    closeConfirm();
    document.getElementById('name-input').value = '';
    document.getElementById('name-overlay').classList.add('active');
    document.getElementById('name-input').focus();
  });

  document.getElementById('btn-name-cancel').addEventListener('click', () => {
    pendingOrder = null;
    document.getElementById('name-overlay').classList.remove('active');
  });

  document.getElementById('name-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('btn-name-submit').click();
  });

  document.getElementById('btn-name-submit').addEventListener('click', async () => {
    if (!pendingOrder) return;
    const naam = document.getElementById('name-input').value.trim();
    if (!naam) {
      document.getElementById('name-input').style.borderColor = '#e05a2b';
      document.getElementById('name-input').placeholder = 'Vul je naam in...';
      document.getElementById('name-overlay').classList.add('active');
      btn.disabled = false;
      return;
    }
    document.getElementById('name-input').style.borderColor = '';
    const beer = pendingOrder;
    const btn = document.getElementById('btn-name-submit');
    btn.disabled = true;
    document.getElementById('name-overlay').classList.remove('active');
    pendingOrder = null;
    try {
      await decrementStock(beer);
      await sendNotification(beer, naam);
      renderGrid();
      showToast(`Geniet van je ${beer.naam}! 🍺`);
    } catch (err) {
      showToast('Er ging iets mis. Probeer opnieuw.');
      console.error(err);
    } finally {
      btn.disabled = false;
    }
  });

  // ─── TOAST ──────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ─── BERICHTKNOP ────────────────────────────────────────────────
  document.getElementById('btn-message').addEventListener('click', () => {
    document.getElementById('msg-input').value = '';
    document.getElementById('msg-overlay').classList.add('active');
  });

  document.getElementById('btn-msg-cancel').addEventListener('click', () => {
    document.getElementById('msg-overlay').classList.remove('active');
  });

  document.getElementById('msg-overlay').addEventListener('click', e => {
    if (e.target === document.getElementById('msg-overlay'))
      document.getElementById('msg-overlay').classList.remove('active');
  });

  document.getElementById('btn-msg-send').addEventListener('click', async () => {
    const tekst = document.getElementById('msg-input').value.trim();
    if (!tekst) return;
    const btn = document.getElementById('btn-msg-send');
    btn.disabled = true;
    btn.textContent = 'Versturen...';
    try {
      await fetch(`https://ntfy.sh/${CONFIG.ntfyTopic}`, {
        method: 'POST',
        headers: { 'Title': 'Bericht van een gast' },
        body: `💬 ${tekst}`
      });
      document.getElementById('msg-overlay').classList.remove('active');
      showToast('Bericht verstuurd!');
    } catch {
      showToast('Versturen mislukt, probeer opnieuw.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Verstuur';
    }
  });

  // ─── INIT ───────────────────────────────────────────────────────
  async function init() {
    const statusBar = document.getElementById('status-bar');
    const loading   = document.getElementById('loading');
    const grid      = document.getElementById('grid');

    if (isConfigured()) {
      try {
        beers = await fetchFromAirtable();
        isDemoMode = false;
        statusBar.textContent = `${beers.length} bieren beschikbaar · Live uit Airtable`;
        statusBar.className = '';
      } catch (err) {
        console.error(err);
        beers = DEMO_BEERS;
        isDemoMode = true;
        statusBar.textContent = '⚠️ Airtable niet bereikbaar — demo-modus actief';
        statusBar.className = 'demo-mode';
      }
    } else {
      beers = DEMO_BEERS;
      isDemoMode = true;
      statusBar.textContent = '🔧 Demo-modus — vul CONFIG in om Airtable te koppelen';
      statusBar.className = 'demo-mode';
    }

    loading.style.display = 'none';
    grid.style.display = 'grid';
    renderGrid();
  }

  init();
</script>
</body>
</html>
